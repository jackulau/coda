name: release-macos

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-macos-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-sign-notarize:
    # macos-14 is Apple Silicon (arm64). Universal builds cross-compile for
    # x86_64 too — so this single runner covers the smoke matrix below.
    runs-on: macos-14

    env:
      # Target triple: universal covers both arches in one .app bundle.
      CODA_MAC_ARCH: universal

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri

      - name: Install bun deps
        run: bun install --frozen-lockfile

      # --- Keychain setup: restore .p12 from base64'd GitHub secret.
      - name: Import Apple Developer ID cert into temp keychain
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          CERT_FILE="$RUNNER_TEMP/apple-cert.p12"

          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > "$CERT_FILE"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          security import "$CERT_FILE" -k "$KEYCHAIN" \
            -P "$APPLE_CERT_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          # Put our temp keychain first in the search list so `security
          # find-identity` in the build wrapper picks it up.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')

          rm -f "$CERT_FILE"

      # --- Signed build.
      - name: Signed build
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CODA_APPLE_DEV_ID: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          CODA_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          bash packages/desktop/src-tauri/scripts/build-mac.sh

      - name: Locate built .app and .dmg
        id: locate
        run: |
          set -euo pipefail
          APP_PATH="$(find packages/desktop/src-tauri/target -type d -name 'Coda.app' | head -1)"
          DMG_PATH="$(find packages/desktop/src-tauri/target -type f -name '*.dmg' | head -1)"
          echo "app=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "dmg=$DMG_PATH" >> "$GITHUB_OUTPUT"

      - name: Verify signature + Gatekeeper
        run: bash packages/desktop/src-tauri/scripts/verify-signed.sh '${{ steps.locate.outputs.app }}'

      - name: Validate notarization creds
        env:
          CODA_APPLE_ID: ${{ secrets.APPLE_ID }}
          CODA_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CODA_APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: bash packages/desktop/src-tauri/scripts/notarize-credentials.sh

      - name: Notarize DMG
        env:
          CODA_APPLE_ID: ${{ secrets.APPLE_ID }}
          CODA_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CODA_APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: bun packages/desktop/src-tauri/scripts/notarize.ts --bundle '${{ steps.locate.outputs.dmg }}'

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.locate.outputs.dmg }}
          fail_on_unmatched_files: true

      # --- Smoke matrix. Universal .app runs on both arches, but we also
      # verify the bundle's Mach-O header explicitly so a broken cross-compile
      # can't silently slip through.
      - name: Smoke — verify universal Mach-O (x64 + arm64)
        run: |
          set -euo pipefail
          BIN="${{ steps.locate.outputs.app }}/Contents/MacOS/Coda"
          if ! file "$BIN" | grep -q 'Mach-O universal'; then
            echo "binary is not universal: $(file "$BIN")" >&2
            exit 1
          fi
          # Both x86_64 AND arm64 slices must be present.
          lipo -archs "$BIN" | tr ' ' '\n' | sort -u | tee /tmp/archs.txt
          grep -qx 'x86_64' /tmp/archs.txt
          grep -qx 'arm64' /tmp/archs.txt
